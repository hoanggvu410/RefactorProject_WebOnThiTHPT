server {
    listen 80;
    server_name _;

    # 1. Điều hướng các request thông thường vào Frontend
    location / {
        proxy_pass http://frontend:5173; # 'frontend' là tên service trong docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Bất kỳ request nào có chữ /api/ hoặc /auth/ sẽ đẩy sang Backend FastAPI
    location ~ ^/(api|auth)/ {
        proxy_pass http://backend:8000; # 'backend' là tên service trong docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
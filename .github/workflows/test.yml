name: Run Pytest Automatically

# Kích hoạt khi có hành động push hoặc tạo Pull Request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:123456@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key
      REFRESH_SECRET_KEY: test-refresh-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"
      FRONTEND_URL: http://localhost:5173
      EMAIL_VERIFY_EXPIRE_MINUTES: "15"
      PASSWORD_RESET_OTP_EXPIRE_MINUTES: "10"
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      GOOGLE_REDIRECT_URI: http://localhost:8000/auth/google/callback
      RESEND_API_KEY: test-resend-api-key
      DEBUG: "true"
      HOST: 0.0.0.0
      PORT: "8000"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }} 
          SUPABASE_URL: "https://your-project.supabase.co" # Điền giá trị dummy nếu db test không dùng đến
          SUPABASE_SERVICE_ROLE_KEY: "your-dummy-key"
        run: |
          alembic upgrade head

      - name: Run Pytest with Coverage
        run: |
          python -m pytest --cov=app app/tests/
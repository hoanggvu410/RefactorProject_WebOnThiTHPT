name: Run Pytest Automatically

# Kích hoạt khi có hành động push hoặc tạo Pull Request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-tests:
    runs-on: ubuntu-latest # Chạy trên máy chủ ảo Linux Ubuntu của GitHub

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Tải code từ repo về máy ảo

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Cài đặt Python phiên bản đúng của bạn

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt # Cài đặt bộ thư viện test độc lập

    - name: Run Pytest with Coverage
      env:
        DATABASE_URL: postgresql://postgres:123456@localhost:5432/postgres
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key
        REFRESH_SECRET_KEY: test-refresh-secret-key
        ALGORITHM: HS256
        ACCESS_TOKEN_EXPIRE_MINUTES: "15"
        REFRESH_TOKEN_EXPIRE_DAYS: "30"
        FRONTEND_URL: http://localhost:5173
        EMAIL_VERIFY_EXPIRE_MINUTES: "15"
        PASSWORD_RESET_OTP_EXPIRE_MINUTES: "10"
        GOOGLE_CLIENT_ID: test-google-client-id
        GOOGLE_CLIENT_SECRET: test-google-client-secret
        GOOGLE_REDIRECT_URI: http://localhost:8000/auth/google/callback
        RESEND_API_KEY: test-resend-api-key
        DEBUG: "true"
        HOST: 0.0.0.0
        PORT: "8000"
      run: |
        python -m pytest --cov=app app/tests/